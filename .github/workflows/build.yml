name: Build & Release

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # Allow manual runs from the Actions tab

# ──────────────────────────────────────────────────────────────────────────────
# Shared environment
# ──────────────────────────────────────────────────────────────────────────────
env:
  SOLUTION_FILE: PVZ-QEWide-Tweaks.sln
  PROJECT_FILE:  SexyAppFramework/SexyAppBase.vcxproj
  PLATFORM:      x86

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# 1. Build both configurations in parallel
# ══════════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.config }})
    runs-on: windows-latest

    strategy:
      fail-fast: false          # Don't cancel the other config if one fails
      matrix:
        config: [ Debug, Release ]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Full history needed for tag creation

      # ── Setup Visual Studio / MSBuild ────────────────────────────────────── 
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # ── Cache MSBuild intermediate objects ──────────────────────────────────
      # Strategy: save a fresh cache every run (keyed by run_id).
      # restore-keys falls back to the nearest previous run automatically.
      #
      # Why NOT hash source files as the key:
      #   Hashing all .cpp/.h means ANY change = cache miss = full rebuild.
      #   Instead we always restore the most recent cache and let MSBuild's
      #   own incremental logic (via .obj/.tlog timestamps) decide what needs
      #   recompiling — typically just the changed files.
      #
      # Cached paths:
      #   SexyAppFramework/<cfg>/  → .obj, .tlog, .res (intermediate files)
      #   <cfg>/                   → .exe, .pdb, .ilk (output files)
      - name: Cache MSBuild intermediates
        uses: actions/cache@v4
        with:
          path: |
            SexyAppFramework/${{ matrix.config }}
            ${{ matrix.config }}
          key: msbuild-${{ matrix.config }}-${{ hashFiles('**/*.vcxproj', '**/*.sln') }}-${{ github.run_id }}
          restore-keys: |
            msbuild-${{ matrix.config }}-${{ hashFiles('**/*.vcxproj', '**/*.sln') }}-
            msbuild-${{ matrix.config }}-

      # ── Build ────────────────────────────────────────────────────────────────
      # The .sln exposes the platform as "x86" (not "Win32").
      # MSBuild validates against the solution config map, so x86 must be used
      # when targeting the .sln. The .vcxproj internally maps x86 → Win32.
      - name: Build ${{ matrix.config }}|${{ env.PLATFORM }}
        run: |
          msbuild "${{ env.SOLUTION_FILE }}" `
            /p:Configuration=${{ matrix.config }} `
            "/p:Platform=${{ env.PLATFORM }}" `
            /m `
            /nologo `
            /verbosity:minimal `
            /p:UseMultiToolTask=true

      # ── Locate the executable ────────────────────────────────────────────────
      # The vcxproj outputs to a sibling of SexyAppFramework/ named after the
      # config (Debug → Debug/, Release → Release/).
      - name: Verify executable exists
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path "${{ matrix.config }}" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exePath) {
            Write-Error "No .exe found in ${{ matrix.config }}/"
            exit 1
          }
          Write-Host "Found executable: $($exePath.FullName)"
          echo "EXE_PATH=$($exePath.DirectoryName)" >> $env:GITHUB_ENV
          echo "EXE_NAME=$($exePath.Name)"          >> $env:GITHUB_ENV

      # ── Strip debug symbols for Release (reduce size) ────────────────────────
      # MSBuild already compiles Release with /O2 + /GL + NDEBUG.
      # We additionally run editbin /RELEASE to set the PE checksum flag,
      # which marks the binary as a final release build.
      - name: Strip Release binary (editbin)
        if: matrix.config == 'Release'
        shell: pwsh
        run: |
          # Use vswhere -find to locate editbin instantly (no recursive dir scan)
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $editbin = & "$vsWhere" -latest -find "**\Hostx86\x86\editbin.exe" |
                      Select-Object -First 1
          if (-not $editbin) {
            # Fallback: try any editbin vswhere can find
            $editbin = & "$vsWhere" -latest -find "**\editbin.exe" |
                        Select-Object -First 1
          }
          if ($editbin) {
            Write-Host "Running editbin: $editbin"
            & "$editbin" /NOLOGO /RELEASE "${{ matrix.config }}\${{ env.EXE_NAME }}"
          } else {
            Write-Warning "editbin not found – skipping PE checksum update."
          }

      # ── Pre-optimize PNGs (lossless) ─────────────────────────────────────────
      # oxipng binary is cached by version — only downloaded once per release.
      - name: Resolve oxipng version
        id: oxipng_ver
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod "https://api.github.com/repos/shssoichiro/oxipng/releases/latest"
          echo "tag=$($rel.tag_name)" >> $env:GITHUB_OUTPUT
          echo "oxipng latest: $($rel.tag_name)"

      - name: Cache oxipng binary
        id: oxipng_cache
        uses: actions/cache@v4
        with:
          path: oxipng_bin
          key: oxipng-${{ steps.oxipng_ver.outputs.tag }}-windows-x64

      - name: Download oxipng (cache miss only)
        if: steps.oxipng_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $rel   = Invoke-RestMethod "https://api.github.com/repos/shssoichiro/oxipng/releases/latest"
          $asset = $rel.assets |
                     Where-Object { $_.name -match "x86_64-pc-windows-msvc" -and $_.name -match "\.zip$" } |
                     Select-Object -First 1
          Write-Host "Downloading oxipng $($rel.tag_name)..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "oxipng.zip" -UseBasicParsing
          Expand-Archive "oxipng.zip" -DestinationPath "oxipng_bin" -Force

      # Cache the optimized assets themselves based on their content hash.
      # If the source PNGs haven't changed, we can skip the slow oxipng pass.
      - name: Cache optimized PNG assets
        id: asset_cache
        uses: actions/cache@v4
        with:
          path: Debug/**/*.png
          key: optimized-pngs-${{ hashFiles('Debug/**/*.png') }}

      - name: Optimize PNGs with oxipng
        if: steps.asset_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $oxipng = Get-ChildItem "oxipng_bin" -Filter "oxipng.exe" -Recurse | Select-Object -First 1
          if (-not $oxipng) { Write-Warning "oxipng not found, skipping"; exit 0 }

          Write-Host "Optimizing PNG files in Debug/ with oxipng..."
          # Process the Debug directory directly. Since this folder is cached,
          # and we have a specific asset cache, subsequent runs will be instant.
          & $oxipng.FullName --opt max --strip all --quiet --recursive "Debug"

      # ── Package: assemble the game folder ───────────────────────────────────
      - name: Assemble package folder
        shell: pwsh
        run: |
          $pkg = "package_${{ matrix.config }}"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null

          # --- Executable ---
          Copy-Item "${{ matrix.config }}\${{ env.EXE_NAME }}" -Destination $pkg\

          # --- PDB (Debug only) — needed for debuggers and crash dump analysis ---
          if ("${{ matrix.config }}" -eq "Debug") {
            $pdb = Get-ChildItem -Path "${{ matrix.config }}" -Filter "*.pdb" | Select-Object -First 1
            if ($pdb) {
              Copy-Item $pdb.FullName -Destination $pkg\
              Write-Host "Included PDB: $($pdb.Name)"
            }
          }

          # --- Runtime DLL bundled at repo root ---
          if (Test-Path "bass.dll")    { Copy-Item "bass.dll"    -Destination $pkg\ }

          # --- Game asset directories that live inside Debug/ ---
          $assetDirs = @(
            "compiled", "data", "images", "languages",
            "particles", "properties", "reanim",
            "resourcepacks", "sounds"
          )
          foreach ($dir in $assetDirs) {
            $src = "Debug\$dir"           # Assets always live alongside the Debug exe
            if (Test-Path $src) {
              Copy-Item $src -Destination $pkg\ -Recurse
            }
          }

          # --- For Release: remove debug artefacts that may have snuck in ---
          if ("${{ matrix.config }}" -eq "Release") {
            Get-ChildItem $pkg -Recurse -Include "*.pdb","*.ilk","*.exp","*.map" |
              Remove-Item -Force
          }

          Write-Host "Package contents:"
          Get-ChildItem $pkg -Recurse | Select-Object FullName


      # ── Compress ─────────────────────────────────────────────────────────────
      # Format : 7z (BCJ2 → LZMA2) — absolute maximum compression
      #
      # Codec chain:
      #   BCJ2          → x86 branch preprocessor (CALL/JMP offset normalization)
      #   LZMA2 m1      → main stream: 1.5 GB dictionary, 273 fast bytes
      #   LZMA2 m2/m3   → call/jump streams: 128 MB dictionary
      #   -ms=on        → solid mode (all files share one dictionary)
      #   -mmc=10000    → 10000 analysis passes for solid archive header
      #   -mmt=on       → all CPU cores
      - name: Compress package
        shell: pwsh
        run: |
          $7z  = "C:\Program Files\7-Zip\7z.exe"
          $cfg = "${{ matrix.config }}"
          $out = "QEWide-Tweaks-$cfg.7z"
          $src = "package_$cfg"

          $args7z = @(
            "a", "-t7z", "-mx=9",
            "-m0=BCJ2",
            "-m1=LZMA2:d=128m:fb=273",
            "-ms=on", "-mmt=on", "-mmc=10000",
            $out, $src
          )

          Write-Host "Running: 7z $($args7z -join ' ')"
          & "$7z" @args7z

          if (-not (Test-Path $out)) {
            Write-Error "7-Zip did not produce $out"
            exit 1
          }

          $sizeMB = [math]::Round((Get-Item $out).Length / 1MB, 2)
          Write-Host "$cfg archive: $out ($sizeMB MB)"

      # ── Upload build artifact ────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QEWide-Tweaks-${{ matrix.config }}
          path: QEWide-Tweaks-${{ matrix.config }}.7z
          retention-days: 30
          if-no-files-found: error

# ══════════════════════════════════════════════════════════════════════════════
# 2. Auto-tag + GitHub Release  (only on push to main/master, not on PRs)
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Needed to create tags & releases

    steps:
      # ── Checkout (needed for tag operations) ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Generate a version tag from the current date + short SHA ─────────────
      - name: Generate version tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      # ── Download both zips produced by the build job ──────────────────────────
      - name: Download Debug artifact
        uses: actions/download-artifact@v4
        with:
          name: QEWide-Tweaks-Debug
          path: dist/

      - name: Download Release artifact
        uses: actions/download-artifact@v4
        with:
          name: QEWide-Tweaks-Release
          path: dist/

      # ── List what we have before publishing ──────────────────────────────────
      - name: List dist contents
        run: ls -lh dist/

      # ── Create tag + GitHub Release with both zips attached ───────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.tag.outputs.tag }}
          name:       "QEWide-Tweaks ${{ steps.tag.outputs.tag }}"
          draft:      false
          prerelease: false
          generate_release_notes: true
          body: |
            ## QEWide-Tweaks — Automated Build

            | Build | Description |
            |-------|-------------|
            | **Release** | Optimized build — best performance, smallest size. Recommended for playing. |
            | **Debug**   | Full debug symbols, no optimizations. Use for testing & crash analysis. |

            Built from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`.
          files: |
            dist/QEWide-Tweaks-Debug.7z
            dist/QEWide-Tweaks-Release.7z
