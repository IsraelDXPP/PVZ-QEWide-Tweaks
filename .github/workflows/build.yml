name: Build & Release

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────────────
# Shared environment
# ──────────────────────────────────────────────────────────────────────────────
env:
  SOLUTION_FILE: PVZ-QEWide-Tweaks.sln
  PLATFORM:      x86
  ASSET_SRC:     game_assets
  PACKAGE_BASE:  QEWide-Tweaks

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# 1. Optimize Assets (PNG)
# ══════════════════════════════════════════════════════════════════════════════
  assets:
    name: Optimize Assets
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve oxipng version
        id: oxipng_ver
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod "https://api.github.com/repos/shssoichiro/oxipng/releases/latest"
          echo "tag=$($rel.tag_name)" >> $env:GITHUB_OUTPUT
          echo "oxipng latest: $($rel.tag_name)"

      - name: Cache oxipng binary
        id: oxipng_cache
        uses: actions/cache@v4
        with:
          path: oxipng_bin
          key: oxipng-${{ steps.oxipng_ver.outputs.tag }}-windows-x64

      - name: Download oxipng (cache miss only)
        if: steps.oxipng_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $rel   = Invoke-RestMethod "https://api.github.com/repos/shssoichiro/oxipng/releases/latest"
          $asset = $rel.assets | Where-Object { $_.name -match "x86_64-pc-windows-msvc" -and $_.name -match "\.zip$" } | Select-Object -First 1
          Write-Host "Downloading oxipng $($rel.tag_name)..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "oxipng.zip" -UseBasicParsing
          Expand-Archive "oxipng.zip" -DestinationPath "oxipng_bin" -Force

      - name: Cache optimized PNG assets
        id: asset_cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ASSET_SRC }}/**/*.png
          key: optimized-pngs-${{ hashFiles('game_assets/**/*.png') }}

      - name: Optimize PNGs with oxipng
        if: steps.asset_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $oxipng = Get-ChildItem "oxipng_bin" -Filter "oxipng.exe" -Recurse | Select-Object -First 1
          if (-not $oxipng) { Write-Error "oxipng not found"; exit 1 }

          Write-Host "Optimizing PNG files in ${{ env.ASSET_SRC }}..."
          & $oxipng.FullName --opt max --strip all --quiet --recursive "${{ env.ASSET_SRC }}"

# ══════════════════════════════════════════════════════════════════════════════
# 2. Build configurations
# ══════════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.config }})
    needs: assets
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config: [ Debug, Release ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore optimized PNG assets
        uses: actions/cache@v4
        with:
          path: ${{ env.ASSET_SRC }}/**/*.png
          key: optimized-pngs-${{ hashFiles('game_assets/**/*.png') }}
          fail-on-cache-miss: false

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Cache MSBuild intermediates
        uses: actions/cache@v4
        with:
          path: |
            SexyAppFramework/${{ matrix.config }}
            ${{ matrix.config }}
          key: msbuild-${{ matrix.config }}-${{ hashFiles('**/*.vcxproj', '**/*.sln') }}
          restore-keys: |
            msbuild-${{ matrix.config }}-

      - name: Build ${{ matrix.config }}|${{ env.PLATFORM }}
        run: |
          msbuild "${{ env.SOLUTION_FILE }}" `
            /p:Configuration=${{ matrix.config }} `
            "/p:Platform=${{ env.PLATFORM }}" `
            /m `
            /nologo `
            /verbosity:minimal `
            /p:UseMultiToolTask=true

      - name: Verify executable exists
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path "${{ matrix.config }}" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exePath) { Write-Error "No .exe found in ${{ matrix.config }}/"; exit 1 }
          echo "EXE_PATH=$($exePath.FullName)" >> $env:GITHUB_ENV
          echo "EXE_NAME=$($exePath.Name)"     >> $env:GITHUB_ENV

      - name: Strip Release binary (editbin)
        if: matrix.config == 'Release'
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & "$vsWhere" -latest -property installationPath
          $editbin = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC\*\bin\Hostx86\x86\editbin.exe" | Select-Object -First 1
          if ($editbin) {
            & "$($editbin.FullName)" /NOLOGO /RELEASE "${{ env.EXE_PATH }}"
          } else {
            Write-Warning "editbin not found."
          }

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Assemble package folder
        shell: pwsh
        run: |
          $pkg = "package_${{ matrix.config }}"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null

          # Copy Executable
          Copy-Item "${{ env.EXE_PATH }}" -Destination $pkg\

          # Include PDB for Debug
          if ("${{ matrix.config }}" -eq "Debug") {
            Get-ChildItem "${{ matrix.config }}" -Filter "*.pdb" | Copy-Item -Destination $pkg\
          }

          # Include Assets from centralized source
          $assetDirs = @("compiled", "data", "images", "languages", "particles", "properties", "reanim", "resourcepacks", "sounds", "bass.dll")
          foreach ($dir in $assetDirs) {
            $src = "${{ env.ASSET_SRC }}/$dir"
            if (Test-Path $src) {
              Copy-Item $src -Destination $pkg\ -Recurse
            }
          }

          # Clean up Release package
          if ("${{ matrix.config }}" -eq "Release") {
            Get-ChildItem $pkg -Recurse -Include "*.pdb","*.ilk","*.exp","*.map" | Remove-Item -Force
          }

      # ── Ultra Compression (BCJ2 + LZMA2) ────────────────────────────────────
      - name: Compress package
        shell: pwsh
        run: |
          $7z  = "C:\Program Files\7-Zip\7z.exe"
          $cfg = "${{ matrix.config }}"
          $out = "${{ env.PACKAGE_BASE }}-$cfg.7z"
          $src = "package_$cfg"

          # BCJ2 Chain Configuration:
          # Stream 0: BCJ2 Filter (automatic stream management)
          # Stream 1: LZMA2 Main Code (128MB dict)
          $args7z = @(
            "a", "-t7z", "-mx=9",
            "-m0=bcj2",
            "-m1=lzma2:d=128m:fb=273",
            "-ms=on", "-mmt=on",
            $out, "./$src/*"
          )

          & "$7z" @args7z
          if (-not (Test-Path $out)) { Write-Error "7-Zip failed to produce $out"; exit 1 }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASE }}-${{ matrix.config }}
          path: ${{ env.PACKAGE_BASE }}-${{ matrix.config }}.7z
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# 3. Create Automated Release
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: GitHub Release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: ${{ env.PACKAGE_BASE }}-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "QEWide-Tweaks Build ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/${{ env.PACKAGE_BASE }}-Debug.7z
            dist/${{ env.PACKAGE_BASE }}-Release.7z
